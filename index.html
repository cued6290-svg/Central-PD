<!doctype html>
<html lang="es">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central PD - FiveM Server</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .server-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .server-subtitle {
            font-size: 18px;
            color: #94a3b8;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(30, 41, 59, 1);
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 42px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
        }

        .btn-discord:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.3);
        }

        .btn-connect {
            background: #10b981;
            color: white;
        }

        .btn-connect:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .btn-copy {
            background: #8b5cf6;
            color: white;
        }

        .btn-copy:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
        }

        .info-box {
            background: rgba(30, 41, 59, 0.8);
            border-left: 4px solid #3b82f6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .loading {
            color: #94a3b8;
            font-size: 14px;
        }

        .error {
            color: #ef4444;
            font-size: 14px;
        }

        .success {
            color: #10b981;
            font-size: 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #3b82f6;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="container">
   <div class="header">
    <div style="position: relative; margin-bottom: 30px;">
     <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px;"><img src="https://i.imgur.com/placeholder.png" alt="Central PD" style="height: 60px; width: auto;" loading="lazy" onerror="console.error('Image failed to load:', this.src); this.style.display='none';">
      <h1 class="server-title">Central PD</h1>
     </div>
     <p class="server-subtitle">Servidor FiveM - Roleplay</p>
     <div id="loginCorner" style="position: absolute; top: 0; right: 0; display: flex; gap: 8px; align-items: center;"><button id="loginBtnCorner" onclick="toggleLoginForm()" class="btn btn-copy" style="margin: 0; padding: 8px 12px; font-size: 11px; text-transform: uppercase;"> 🔒 Admin </button>
     </div>
    </div>
    <div style="margin-bottom: 40px; text-align: center;">
     <div style="font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">
      Estado Actual:
     </div>
     <div id="statusDisplayLarge" style="font-size: 48px; font-weight: bold; color: #ffffff; background: linear-gradient(135deg, #f97316, #ea580c); padding: 25px 40px; border-radius: 12px; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3);">
      ONLINE
     </div>
    </div>
   </div>
   <div class="stats-container">
    <div class="stat-card">
     <div class="stat-number" id="playerCount"><span class="spinner"></span>
     </div>
     <div class="stat-label">
      Jugadores Online
     </div>
    </div>
    <div class="stat-card">
     <div class="stat-number" id="maxPlayers"><span class="spinner"></span>
     </div>
     <div class="stat-label">
      Capacidad Máxima
     </div>
    </div>
    <div class="stat-card">
     <div class="stat-number" id="uptime"><span class="spinner"></span>
     </div>
     <div class="stat-label">
      Estado
     </div>
    </div>
   </div>
   <div class="buttons-container"><a href="https://discord.gg/tu-codigo" target="_blank" rel="noopener noreferrer" class="btn btn-discord"> 📱 Unirse a Discord </a> <button class="btn btn-connect" onclick="connectToServer()"> 🚀 Conectar al Servidor </button> <button class="btn btn-copy" onclick="copyIP()"> 📋 Copiar IP </button>
   </div>
   <div class="info-box">
    <div class="info-label">
     CFX Code
    </div>
    <div class="info-value">
     965aek
    </div>
   </div>
   <div id="loginSection" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); border: 2px solid rgba(139, 92, 246, 0.5); border-radius: 12px; padding: 30px; z-index: 1000; backdrop-filter: blur(10px); min-width: 300px;">
    <div style="font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #e2e8f0;">
     Acceso Administrador
    </div>
    <div style="margin-bottom: 15px;"><label style="display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Contraseña</label>
     <div style="position: relative; display: flex; align-items: center;"><input type="password" id="loginPassword" placeholder="Ingresa la contraseña..." style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 6px; padding: 10px 15px; color: #e2e8f0; font-size: 14px; padding-right: 40px;"> <button type="button" onclick="togglePasswordVisibility()" style="position: absolute; right: 10px; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; padding: 0; display: flex; align-items: center; justify-content: center;"> <span id="eyeIcon">👁️</span> </button>
     </div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"><button onclick="loginAdmin()" class="btn btn-connect" style="margin: 0; padding: 10px 15px; font-size: 14px;"> 🔓 Iniciar Sesión </button> <button onclick="toggleLoginForm()" class="btn" style="margin: 0; padding: 10px 15px; font-size: 14px; background: #64748b; color: white;"> ✕ Cancelar </button>
    </div>
   </div>
   <div id="loginBackdrop" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 999;" onclick="toggleLoginForm()"></div>
   <div id="adminPanel" style="display: none; position: fixed; bottom: 20px; right: 20px; background: rgba(30, 41, 59, 0.95); border: 2px solid rgba(139, 92, 246, 0.5); border-radius: 12px; padding: 15px; z-index: 1000; backdrop-filter: blur(10px); min-width: 280px; max-height: 500px; overflow-y: auto;">
    <div style="margin-bottom: 10px;"><button onclick="toggleStatusEditor()" class="btn btn-copy" style="width: 100%; padding: 10px 15px; font-size: 13px; margin: 0; margin-bottom: 8px;"> 🔧 Cambiar Estado </button>
    </div>
    <div id="statusEditor" style="display: none; margin-bottom: 12px; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 6px;"><label style="display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Nuevo Estado</label> <input type="text" id="customStatus" placeholder="Ej: En Mantenimiento..." style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 12px; margin-bottom: 8px;">
     <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"><button onclick="saveCustomStatus()" class="btn btn-connect" style="margin: 0; padding: 8px 12px; font-size: 12px;"> ✓ Guardar </button> <button onclick="toggleStatusEditor()" class="btn" style="margin: 0; padding: 8px 12px; font-size: 12px; background: #64748b; color: white;"> ✕ Cancelar </button>
     </div>
    </div>
    <div style="margin-bottom: 10px;"><button onclick="toggleAnnouncementEditor()" class="btn btn-copy" style="width: 100%; padding: 10px 15px; font-size: 13px; margin: 0; margin-bottom: 8px; background: #f97316;"> 📢 Enviar Anuncio </button>
    </div>
    <div id="announcementEditor" style="display: none; margin-bottom: 12px; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(249, 115, 22, 0.3); border-radius: 6px;"><label style="display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Anuncio</label> <input type="text" id="announcementText" placeholder="Escribe un anuncio..." style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 12px; margin-bottom: 8px;">
     <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"><button onclick="sendAnnouncement()" class="btn btn-connect" style="margin: 0; padding: 8px 12px; font-size: 12px;"> ✓ Enviar </button> <button onclick="toggleAnnouncementEditor()" class="btn" style="margin: 0; padding: 8px 12px; font-size: 12px; background: #64748b; color: white;"> ✕ Cancelar </button>
     </div>
    </div>
    <div style="margin-bottom: 10px;"><button onclick="toggleNoticeEditor()" class="btn" style="width: 100%; padding: 10px 15px; font-size: 13px; margin: 0; margin-bottom: 8px; background: #06b6d4;"> 📝 Agregar Aviso </button>
    </div>
    <div id="noticeEditor" style="display: none; margin-bottom: 12px; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(6, 182, 212, 0.3); border-radius: 6px;"><label style="display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Aviso</label> <input type="text" id="noticeText" placeholder="Escribe un aviso importante..." style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 12px; margin-bottom: 8px;">
     <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"><button onclick="addNotice()" class="btn btn-connect" style="margin: 0; padding: 8px 12px; font-size: 12px;"> ✓ Agregar </button> <button onclick="toggleNoticeEditor()" class="btn" style="margin: 0; padding: 8px 12px; font-size: 12px; background: #64748b; color: white;"> ✕ Cancelar </button>
     </div>
    </div>
    <div style="margin-bottom: 10px;"><button onclick="toggleServerConfig()" class="btn" style="width: 100%; padding: 10px 15px; font-size: 13px; margin: 0; margin-bottom: 8px; background: #ec4899;"> ⚙️ Configuración </button>
    </div>
    <div id="serverConfig" style="display: none; margin-bottom: 12px; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(236, 72, 153, 0.3); border-radius: 6px;"><label style="display: block; font-size: 11px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase;">CFX Code</label> <input type="text" id="cfxCodeInput" placeholder="965aek" style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 12px; margin-bottom: 8px;"> <label style="display: block; font-size: 11px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; margin-top: 10px;">Discord Link</label> <input type="text" id="discordLink" placeholder="https://discord.gg/..." style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 12px; margin-bottom: 8px;">
     <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"><button onclick="saveServerConfig()" class="btn btn-connect" style="margin: 0; padding: 8px 12px; font-size: 12px;"> ✓ Guardar </button> <button onclick="toggleServerConfig()" class="btn" style="margin: 0; padding: 8px 12px; font-size: 12px; background: #64748b; color: white;"> ✕ Cancelar </button>
     </div>
    </div><button onclick="logoutAdmin()" class="btn" style="width: 100%; padding: 10px 15px; font-size: 13px; background: #ef4444; color: white; margin: 0;"> 🚪 Cerrar Sesión </button>
   </div>
   <div id="status" style="text-align: center; margin-top: 20px;"></div>
  </div>
  <script>
        let CFX_CODE = localStorage.getItem('cfxCode') || '965aek';
        let DISCORD_LINK = localStorage.getItem('discordLink') || 'https://discord.gg/tu-codigo';
        const SERVER_IP = '173.249.31.192:30120';
        const AUTHORIZED_PASSWORDS = ['admin123', 'password456'];
        let isAdminLogged = false;

        function loadCustomStatus() {
            const saved = localStorage.getItem('customServerStatus');
            if (saved) {
                document.getElementById('statusDisplayLarge').textContent = saved;
            }
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('loginPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '👁️‍🗨️';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        }

        function toggleLoginForm() {
            const loginSection = document.getElementById('loginSection');
            const backdrop = document.getElementById('loginBackdrop');
            const isHidden = loginSection.style.display === 'none';
            loginSection.style.display = isHidden ? 'block' : 'none';
            backdrop.style.display = isHidden ? 'block' : 'none';
            if (isHidden) {
                document.getElementById('loginPassword').focus();
                document.getElementById('loginPassword').value = '';
            }
        }

        function loginAdmin() {
            const password = document.getElementById('loginPassword').value;
            if (!AUTHORIZED_PASSWORDS.includes(password)) {
                showError('❌ Contraseña incorrecta');
                document.getElementById('loginPassword').value = '';
                return;
            }
            isAdminLogged = true;
            localStorage.setItem('adminSession', 'true');
            showSuccess('✓ Sesión iniciada correctamente');
            updateAdminUI();
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('loginBackdrop').style.display = 'none';
            document.getElementById('loginPassword').value = '';
        }

        function logoutAdmin() {
            isAdminLogged = false;
            localStorage.removeItem('adminSession');
            showSuccess('✓ Sesión cerrada');
            updateAdminUI();
        }

        function updateAdminUI() {
            const loginBtn = document.getElementById('loginBtnCorner');
            const adminPanel = document.getElementById('adminPanel');
            if (isAdminLogged) {
                loginBtn.style.display = 'none';
                adminPanel.style.display = 'block';
            } else {
                loginBtn.style.display = 'block';
                adminPanel.style.display = 'none';
            }
        }

        function toggleStatusEditor() {
            const editor = document.getElementById('statusEditor');
            editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
            if (editor.style.display === 'block') {
                document.getElementById('customStatus').focus();
            }
        }

        function saveCustomStatus() {
            const status = document.getElementById('customStatus').value.trim();
            if (!status) {
                showError('El estado no puede estar vacío');
                return;
            }
            localStorage.setItem('customServerStatus', status);
            document.getElementById('statusDisplayLarge').textContent = status;
            showSuccess('✓ Estado actualizado correctamente');
            setTimeout(() => {
                document.getElementById('statusEditor').style.display = 'none';
                document.getElementById('customStatus').value = '';
            }, 1000);
        }

        function toggleAnnouncementEditor() {
            const editor = document.getElementById('announcementEditor');
            editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
            if (editor.style.display === 'block') {
                document.getElementById('announcementText').focus();
            }
        }

        function sendAnnouncement() {
            const announcement = document.getElementById('announcementText').value.trim();
            if (!announcement) {
                showError('El anuncio no puede estar vacío');
                return;
            }
            let announcements = JSON.parse(localStorage.getItem('announcements') || '[]');
            announcements.unshift({
                id: Date.now(),
                text: announcement,
                timestamp: new Date().toLocaleString('es-ES')
            });
            if (announcements.length > 10) announcements = announcements.slice(0, 10);
            localStorage.setItem('announcements', JSON.stringify(announcements));
            showSuccess('✓ Anuncio enviado correctamente');
            setTimeout(() => {
                document.getElementById('announcementEditor').style.display = 'none';
                document.getElementById('announcementText').value = '';
            }, 1000);
        }

        function toggleNoticeEditor() {
            const editor = document.getElementById('noticeEditor');
            editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
            if (editor.style.display === 'block') {
                document.getElementById('noticeText').focus();
            }
        }

        function addNotice() {
            const notice = document.getElementById('noticeText').value.trim();
            if (!notice) {
                showError('El aviso no puede estar vacío');
                return;
            }
            let notices = JSON.parse(localStorage.getItem('notices') || '[]');
            notices.unshift({
                id: Date.now(),
                text: notice,
                timestamp: new Date().toLocaleString('es-ES'),
                active: true
            });
            if (notices.length > 5) notices = notices.slice(0, 5);
            localStorage.setItem('notices', JSON.stringify(notices));
            showSuccess('✓ Aviso agregado correctamente');
            setTimeout(() => {
                document.getElementById('noticeEditor').style.display = 'none';
                document.getElementById('noticeText').value = '';
            }, 1000);
        }

        function toggleServerConfig() {
            const editor = document.getElementById('serverConfig');
            editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
            if (editor.style.display === 'block') {
                document.getElementById('cfxCodeInput').value = CFX_CODE;
                document.getElementById('discordLink').value = DISCORD_LINK;
            }
        }

        function saveServerConfig() {
            const cfxCode = document.getElementById('cfxCodeInput').value.trim();
            const discordLink = document.getElementById('discordLink').value.trim();
            if (!cfxCode) {
                showError('El CFX Code no puede estar vacío');
                return;
            }
            CFX_CODE = cfxCode;
            DISCORD_LINK = discordLink;
            localStorage.setItem('cfxCode', cfxCode);
            localStorage.setItem('discordLink', discordLink);
            document.querySelectorAll('[href*="discord.gg"]').forEach(el => {
                el.href = discordLink;
            });
            document.querySelector('.info-value').textContent = cfxCode;
            showSuccess('✓ Configuración guardada correctamente');
            setTimeout(() => {
                document.getElementById('serverConfig').style.display = 'none';
            }, 1000);
        }

        async function getServerInfo() {
            try {
                const response = await fetch(`https://servers-frontend.fivem.net/api/servers/single/${CFX_CODE}`);
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                if (data && data.Data) {
                    const players = data.Data.PlayersOnline || 0;
                    const maxPlayers = data.Data.MaxClients || 128;
                    document.getElementById('playerCount').textContent = players;
                    document.getElementById('maxPlayers').textContent = maxPlayers;
                    document.getElementById('uptime').textContent = '🟢 Online';
                    document.getElementById('status').innerHTML = '';
                } else {
                    showOffline();
                }
            } catch (error) {
                console.error('Error:', error);
                showOffline();
            }
        }

        function showOffline() {
            document.getElementById('playerCount').textContent = '?';
            document.getElementById('maxPlayers').textContent = '?';
            document.getElementById('uptime').textContent = '🔴 Offline';
            showError('Servidor no disponible en este momento');
        }

        function connectToServer() {
            window.location.href = `fivem://connect/${CFX_CODE}`;
        }

        function copyIP() {
            navigator.clipboard.writeText(CFX_CODE).then(() => {
                showSuccess('✓ CFX Code copiado!');
            }).catch(() => {
                showError('Error al copiar');
            });
        }

        function showSuccess(msg) {
            const status = document.getElementById('status');
            status.innerHTML = `<span class="success">${msg}</span>`;
            setTimeout(() => status.innerHTML = '', 3000);
        }

        function showError(msg) {
            const status = document.getElementById('status');
            status.innerHTML = `<span class="error">${msg}</span>`;
            setTimeout(() => status.innerHTML = '', 3000);
        }

        function init() {
            loadCustomStatus();
            if (localStorage.getItem('adminSession') === 'true') {
                isAdminLogged = true;
            }
            updateAdminUI();
            getServerInfo();
            setInterval(getServerInfo, 30000);
        }
