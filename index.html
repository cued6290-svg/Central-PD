<!doctype html>
<html lang="es">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central PD - FiveM Server</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .server-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .server-subtitle {
            font-size: 18px;
            color: #94a3b8;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(30, 41, 59, 1);
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 42px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
        }

        .btn-discord:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.3);
        }

        .btn-connect {
            background: #10b981;
            color: white;
        }

        .btn-connect:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .btn-copy {
            background: #8b5cf6;
            color: white;
        }

        .btn-copy:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
        }

        .info-box {
            background: rgba(30, 41, 59, 0.8);
            border-left: 4px solid #3b82f6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .loading {
            color: #94a3b8;
            font-size: 14px;
        }

        .error {
            color: #ef4444;
            font-size: 14px;
        }

        .success {
            color: #10b981;
            font-size: 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #3b82f6;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="container">
   <div class="header">
    <h1 class="server-title">🎮 Central PD</h1>
    <p class="server-subtitle">Servidor FiveM - Roleplay</p>
   </div>
   <div class="stats-container">
    <div class="stat-card">
     <div class="stat-number" id="playerCount"><span class="spinner"></span>
     </div>
     <div class="stat-label">
      Jugadores Online
     </div>
    </div>
    <div class="stat-card">
     <div class="stat-number" id="maxPlayers"><span class="spinner"></span>
     </div>
     <div class="stat-label">
      Capacidad Máxima
     </div>
    </div>
    <div class="stat-card">
     <div class="stat-number" id="uptime"><span class="spinner"></span>
     </div>
     <div class="stat-label">
      Estado
     </div>
    </div>
   </div>
   <div class="buttons-container"><a href="https://discord.gg/tu-codigo" target="_blank" rel="noopener noreferrer" class="btn btn-discord"> 📱 Unirse a Discord </a> <button class="btn btn-connect" onclick="connectToServer()"> 🚀 Conectar al Servidor </button> <button class="btn btn-copy" onclick="copyIP()"> 📋 Copiar IP </button>
   </div>
   <div class="info-box">
    <div class="info-label">
     CFX Code
    </div>
    <div class="info-value">
     965aek
    </div>
   </div>
   <div id="status" style="text-align: center; margin-top: 20px;"></div>
  </div>
  <script>
        const CFX_CODE = '965aek';
        const SERVER_IP = '173.249.31.192:30120';
        const DISCORD_LINK = 'https://discord.gg/tu-codigo';

        async function getServerInfo() {
            try {
                // Usa un proxy CORS para obtener la información
                const response = await fetch(`https://cors-anywhere.herokuapp.com/http://${SERVER_IP}/info.json`);
                
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();

                if (data && data.players !== undefined) {
                    const players = data.players || 0;
                    const maxPlayers = data.sv_maxclients || data.maxPlayers || 128;
                    
                    document.getElementById('playerCount').textContent = players;
                    document.getElementById('maxPlayers').textContent = maxPlayers;
                    document.getElementById('uptime').textContent = '🟢 Online';
                    document.getElementById('status').innerHTML = '';
                } else {
                    showOffline();
                }
            } catch (error) {
                console.error('Error:', error);
                // Si falla el proxy, muestra offline pero los botones siguen funcionando
                showOffline();
            }
        }

        function showOffline() {
            document.getElementById('playerCount').textContent = '?';
            document.getElementById('maxPlayers').textContent = '?';
            document.getElementById('uptime').textContent = '🔴 Offline';
            showError('Servidor no disponible en este momento');
        }

        function connectToServer() {
            window.location.href = `fivem://connect/${CFX_CODE}`;
        }

        function copyIP() {
            navigator.clipboard.writeText(CFX_CODE).then(() => {
                showSuccess('¡CFX Code copiado!');
            }).catch(() => {
                showError('Error al copiar');
            });
        }

        function showSuccess(msg) {
            const status = document.getElementById('status');
            status.innerHTML = `<span class="success">✓ ${msg}</span>`;
            setTimeout(() => status.innerHTML = '', 3000);
        }

        function showError(msg) {
            const status = document.getElementById('status');
            status.innerHTML = `<span class="error">✗ ${msg}</span>`;
            setTimeout(() => status.innerHTML = '', 3000);
        }

        getServerInfo();
        setInterval(getServerInfo, 30000);
    </script>

</html>
